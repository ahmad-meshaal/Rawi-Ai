<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>راوي — روياتي</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header id="mobile-header">
    <a href="/index.html" style="font-family:Amiri,serif;font-size:22px;font-weight:700;color:#C87539;text-decoration:none">راوي</a>
    <div id="mobile-user-menu"></div>
  </header>

  <div class="app-layout">
    <aside id="sidebar"></aside>
    <main class="main-area">
      <div class="content-wrapper">
        <div class="page-header">
          <div>
            <h1 class="page-title">روياتي</h1>
            <p class="page-subtitle">رواياتك الخاصة في مكان واحد</p>
          </div>
          <button class="btn btn-primary" onclick="openModal('create-modal')" data-testid="btn-create-novel">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
            رواية جديدة
          </button>
        </div>

        <div id="novels-container">
          <div class="loading-center"><div class="spinner"></div></div>
        </div>
      </div>
    </main>
  </div>

  <nav id="mobile-nav"></nav>
  <div id="toast-container"></div>

  <!-- Create Novel Modal -->
  <div class="modal-overlay" id="create-modal" onclick="handleModalClick(event,'create-modal')">
    <div class="modal-box">
      <h2 class="modal-title">رواية جديدة</h2>
      <form id="create-form">
        <div class="form-group">
          <label class="label">عنوان الرواية *</label>
          <input class="input" name="title" placeholder="أدخل عنوان الرواية" required maxlength="200" autocomplete="off" data-testid="input-novel-title">
        </div>
        <div class="form-group">
          <label class="label">التصنيف</label>
          <input class="input" name="genre" placeholder="مثال: دراما، رومانسي، خيال علمي" autocomplete="off" data-testid="input-novel-genre">
        </div>
        <div class="form-group">
          <label class="label">ملخص الرواية</label>
          <textarea class="input textarea" name="synopsis" placeholder="اكتب ملخصاً مختصراً للقصة..." data-testid="input-novel-synopsis"></textarea>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-primary" id="create-btn" data-testid="btn-submit-novel">إنشاء الرواية</button>
          <button type="button" class="btn btn-secondary" onclick="closeModal('create-modal')">إلغاء</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    function handleModalClick(e, id) { if (e.target.classList.contains('modal-overlay')) closeModal(id); }

    async function loadNovels() {
      const container = document.getElementById('novels-container');
      try {
        const novels = await api.get('/api/my-novels');
        if (!novels || novels.length === 0) {
          container.innerHTML = `<div class="empty-state">
            <div class="empty-icon">📚</div>
            <div class="empty-title">لا توجد روايات بعد</div>
            <div class="empty-desc">ابدأ رحلتك الأدبية بإنشاء أول رواية</div>
            <button class="btn btn-primary" onclick="openModal('create-modal')" style="margin-top:8px">إنشاء رواية الآن</button>
          </div>`;
          return;
        }
        container.innerHTML = `<div class="novel-grid">${novels.map(novelCard).join('')}</div>`;
      } catch (err) {
        container.innerHTML = `<div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <div class="empty-title">فشل التحميل</div>
          <div class="empty-desc">${escHtml(err.message)}</div>
        </div>`;
      }
    }

    function novelCard(n) {
      return `<div class="card" data-testid="card-novel-${n.id}">
        <a href="/novel.html?id=${n.id}" style="display:block;aspect-ratio:3/4;position:relative;overflow:hidden">
          ${n.coverUrl
            ? `<img src="${escHtml(n.coverUrl)}" style="width:100%;height:100%;object-fit:cover">`
            : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:52px;background:linear-gradient(135deg,rgba(200,117,57,.18),rgba(200,117,57,.05))">📖</div>`
          }
          <div style="position:absolute;top:10px;right:10px">${statusBadge(n.status)}</div>
        </a>
        <div class="card-body">
          <a href="/novel.html?id=${n.id}" style="text-decoration:none">
            <h3 style="font-family:Amiri,serif;font-size:17px;font-weight:700;margin-bottom:4px;color:#22262A">${escHtml(n.title)}</h3>
          </a>
          <div style="margin-bottom:8px">${genreBadges(n.genre)}</div>
          <div style="font-size:12px;color:#aaa;margin-bottom:12px">${formatDate(n.createdAt)}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <a href="/novel.html?id=${n.id}" class="btn btn-primary btn-sm" style="flex:1;justify-content:center">فتح</a>
            <button class="btn btn-danger btn-icon" onclick="deleteNovel(${n.id}, event)" title="حذف" data-testid="btn-delete-novel-${n.id}">
              <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
          </div>
        </div>
      </div>`;
    }

    async function deleteNovel(id, e) {
      e.preventDefault();
      const ok = await confirmDialog('هل تريد حذف هذه الرواية نهائياً؟ لا يمكن التراجع عن هذا الإجراء.');
      if (!ok) return;
      try {
        await api.delete(`/api/novels/${id}`);
        toast('تم حذف الرواية بنجاح');
        await loadNovels();
      } catch (err) { toast(err.message, 'error'); }
    }

    document.getElementById('create-form').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('create-btn');
      const fd = new FormData(e.target);
      const data = { title: fd.get('title'), genre: fd.get('genre'), synopsis: fd.get('synopsis'), status: 'draft' };
      setLoading(btn, true);
      try {
        const novel = await api.post('/api/novels', data);
        closeModal('create-modal');
        e.target.reset();
        toast('تم إنشاء الرواية بنجاح! 🎉', 'success');
        window.location.href = `/novel.html?id=${novel.id}`;
      } catch (err) {
        toast(err.message, 'error');
        setLoading(btn, false, 'إنشاء الرواية');
      }
    };

    (async () => {
      const user = await requireAuth();
      if (!user) return;
      await initPage('home');
      await loadNovels();
    })();
  </script>
</body>
</html>
