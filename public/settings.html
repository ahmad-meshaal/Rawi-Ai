<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>راوي — الإعدادات</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .settings-card { background:white; border-radius:20px; border:1px solid #e8e8e5; padding:28px; margin-bottom:20px; box-shadow:0 2px 12px rgba(0,0,0,.06); }
    .settings-card h3 { font-family:Amiri,serif; font-size:20px; font-weight:700; margin-bottom:20px; padding-bottom:14px; border-bottom:1px solid #f0ede9; }
    .avatar-preview { width:90px; height:90px; border-radius:50%; overflow:hidden; border:3px solid #e8e8e5; background:#C87539; display:flex; align-items:center; justify-content:center; font-size:32px; color:white; font-weight:700; flex-shrink:0; }
  </style>
</head>
<body>
  <header id="mobile-header">
    <a href="/index.html" style="font-family:Amiri,serif;font-size:22px;font-weight:700;color:#C87539;text-decoration:none">راوي</a>
    <div id="mobile-user-menu"></div>
  </header>

  <div class="app-layout">
    <aside id="sidebar"></aside>
    <main class="main-area">
      <div class="content-wrapper">
        <div class="page-header">
          <div>
            <h1 class="page-title">⚙️ الإعدادات</h1>
            <p class="page-subtitle">إدارة حسابك وملفك الشخصي</p>
          </div>
        </div>

        <!-- Profile Settings -->
        <div class="settings-card">
          <h3>الملف الشخصي</h3>

          <!-- Avatar -->
          <div style="display:flex;align-items:center;gap:20px;margin-bottom:24px;flex-wrap:wrap">
            <div class="avatar-preview" id="avatar-preview">?</div>
            <div>
              <div style="font-weight:600;margin-bottom:10px;font-size:15px">الصورة الشخصية</div>
              <div style="display:flex;gap:8px;flex-wrap:wrap">
                <label class="btn btn-secondary btn-sm" style="cursor:pointer">
                  رفع صورة
                  <input type="file" id="avatar-file" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
                </label>
                <button class="btn btn-outline btn-sm" onclick="openModal('ai-avatar-modal')">✨ توليد بالذكاء</button>
                <button class="btn btn-ghost btn-sm" onclick="clearAvatar()">إزالة</button>
              </div>
            </div>
          </div>

          <form id="profile-form">
            <div class="form-group">
              <label class="label">اسم المستخدم</label>
              <input class="input" id="form-username" placeholder="اسم المستخدم" autocomplete="username">
            </div>
            <div class="form-group">
              <label class="label">نبذة شخصية</label>
              <textarea class="input textarea" id="form-bio" placeholder="اكتب نبذة قصيرة عنك..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary" id="save-profile-btn">حفظ التغييرات</button>
          </form>
        </div>

        <!-- Danger Zone -->
        <div class="settings-card" style="border-color:#fee2e2">
          <h3 style="color:#dc2626">منطقة الخطر</h3>
          <p style="font-size:14px;color:#888;margin-bottom:16px">هذه الإجراءات لا يمكن التراجع عنها</p>
          <button class="btn btn-danger" onclick="logout()">تسجيل الخروج</button>
        </div>

        <!-- Admin Panel Link -->
        <div id="admin-link-section" style="display:none">
          <div class="settings-card" style="border-color:#C87539">
            <h3 style="color:#C87539">🔑 لوحة الإدارة</h3>
            <p style="font-size:14px;color:#888;margin-bottom:16px">صلاحيات المشرف — إدارة الحسابات والروايات</p>
            <a href="/admin.html" class="btn btn-primary">الدخول للوحة الإدارة</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <nav id="mobile-nav"></nav>
  <div id="toast-container"></div>

  <!-- AI Avatar Modal -->
  <div class="modal-overlay" id="ai-avatar-modal" onclick="if(event.target===this)closeModal('ai-avatar-modal')">
    <div class="modal-box">
      <h2 class="modal-title">✨ توليد صورة بالذكاء الاصطناعي</h2>
      <div class="form-group">
        <label class="label">وصف الصورة المطلوبة</label>
        <textarea class="input textarea" id="avatar-desc" placeholder="مثال: صورة كاتب أدبي بخلفية مكتبة فاخرة، بأسلوب فني رسمي..."></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="generateAvatar()" id="gen-avatar-btn">توليد الصورة</button>
        <button class="btn btn-secondary" onclick="closeModal('ai-avatar-modal')">إلغاء</button>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script>
    let currentAvatarUrl = '';
    let currentUser = null;

    async function load() {
      currentUser = await requireAuth();
      if (!currentUser) return;
      document.getElementById('form-username').value = currentUser.username || '';
      document.getElementById('form-bio').value = currentUser.bio || '';
      currentAvatarUrl = currentUser.avatarUrl || '';
      renderAvatar();
      // Show admin link if admin email
      if (currentUser.email === 'ahmad.meshaal.2040@gmail.com') {
        document.getElementById('admin-link-section').style.display = 'block';
      }
    }

    function renderAvatar() {
      const el = document.getElementById('avatar-preview');
      if (currentAvatarUrl) {
        el.innerHTML = `<img src="${escHtml(currentAvatarUrl)}" style="width:100%;height:100%;object-fit:cover">`;
        el.style.padding = '0';
      } else {
        el.innerHTML = (currentUser?.username || '?')[0];
        el.style.padding = '';
      }
    }

    async function uploadAvatar(input) {
      if (!input.files[0]) return;
      const btn = document.querySelector('.btn-secondary.btn-sm label') || input.previousElementSibling;
      toast('جارٍ الرفع...', 'info');
      try {
        const url = await uploadFile(input.files[0]);
        currentAvatarUrl = url;
        renderAvatar();
        toast('تم رفع الصورة');
      } catch (err) { toast(err.message, 'error'); }
    }

    function clearAvatar() { currentAvatarUrl = ''; renderAvatar(); }

    async function generateAvatar() {
      const btn = document.getElementById('gen-avatar-btn');
      const desc = document.getElementById('avatar-desc').value.trim();
      if (!desc) { toast('أدخل وصفاً للصورة', 'error'); return; }
      setLoading(btn, true);
      try {
        const result = await api.post('/api/ai/generate-avatar', { description: desc });
        if (result.b64_json) {
          currentAvatarUrl = 'data:image/png;base64,' + result.b64_json;
        } else if (result.url) {
          currentAvatarUrl = result.url;
        }
        renderAvatar();
        closeModal('ai-avatar-modal');
        toast('تم توليد الصورة بنجاح ✨', 'success');
      } catch (err) { toast(err.message, 'error'); }
      setLoading(btn, false, 'توليد الصورة');
    }

    document.getElementById('profile-form').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('save-profile-btn');
      setLoading(btn, true);
      try {
        const updates = {
          username: document.getElementById('form-username').value.trim(),
          bio: document.getElementById('form-bio').value.trim(),
          avatarUrl: currentAvatarUrl,
        };
        await api.patch('/api/auth/profile', updates);
        toast('تم حفظ الإعدادات بنجاح ✓', 'success');
      } catch (err) { toast(err.message, 'error'); }
      setLoading(btn, false, 'حفظ التغييرات');
    };

    (async () => {
      await initPage('settings');
      await load();
    })();
  </script>
</body>
</html>
