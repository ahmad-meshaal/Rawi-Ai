<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>راوي — لوحة الإدارة</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .admin-badge { background:#dc2626; color:white; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:700; }
    .admin-table { width:100%; border-collapse:collapse; }
    .admin-table th { text-align:right; padding:12px 16px; font-size:13px; color:#888; font-weight:600; border-bottom:2px solid #f0ede9; }
    .admin-table td { padding:14px 16px; border-bottom:1px solid #f8f5f2; font-size:14px; vertical-align:middle; }
    .admin-table tr:hover td { background:#FAF9F6; }
    .admin-card { background:white; border-radius:20px; border:1px solid #e8e8e5; overflow:hidden; margin-bottom:32px; box-shadow:0 2px 12px rgba(0,0,0,.06); }
    .admin-card-header { padding:20px 24px; border-bottom:1px solid #f0ede9; display:flex; align-items:center; justify-content:space-between; }
    .admin-card-title { font-family:Amiri,serif; font-size:20px; font-weight:700; }
    .admin-stats { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:16px; margin-bottom:32px; }
    .admin-stat { background:white; border-radius:16px; border:1px solid #e8e8e5; padding:20px; text-align:center; }
    .admin-stat-num { font-size:32px; font-weight:900; color:#C87539; }
    .admin-stat-label { font-size:13px; color:#888; margin-top:4px; }
  </style>
</head>
<body>
  <header id="mobile-header">
    <a href="/index.html" style="font-family:Amiri,serif;font-size:22px;font-weight:700;color:#C87539;text-decoration:none">راوي</a>
    <div id="mobile-user-menu"></div>
  </header>

  <div class="app-layout">
    <aside id="sidebar"></aside>
    <main class="main-area">
      <div class="content-wrapper" id="admin-content">
        <div class="loading-center"><div class="spinner"></div></div>
      </div>
    </main>
  </div>

  <nav id="mobile-nav"></nav>
  <div id="toast-container"></div>

  <script src="/js/common.js"></script>
  <script>
    const ADMIN_EMAIL = 'ahmad.meshaal.2040@gmail.com';

    async function load() {
      const user = await requireAuth();
      if (!user) return;

      // Verify admin
      const isAdmin = await api.get('/api/admin/check').catch(() => null);
      if (!isAdmin || !isAdmin.isAdmin) {
        document.getElementById('admin-content').innerHTML = `
          <div class="error-page">
            <div style="font-size:64px">🔒</div>
            <h2 style="font-size:24px;margin-top:16px">غير مصرح بالوصول</h2>
            <p style="color:#888;margin-top:8px">هذه الصفحة مخصصة للمشرف فقط</p>
            <a href="/index.html" class="btn btn-primary" style="margin-top:20px">العودة للرئيسية</a>
          </div>`;
        return;
      }

      renderAdmin();
    }

    async function renderAdmin() {
      const [novels, users] = await Promise.all([
        api.get('/api/admin/novels'),
        api.get('/api/admin/users'),
      ]);

      const published = novels.filter(n => n.status === 'published').length;
      const draft = novels.filter(n => n.status === 'draft').length;

      document.getElementById('admin-content').innerHTML = `
        <div class="page-header">
          <div>
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:4px">
              <h1 class="page-title">لوحة الإدارة</h1>
              <span class="admin-badge">ADMIN</span>
            </div>
            <p class="page-subtitle">إدارة كاملة لجميع الروايات والحسابات</p>
          </div>
        </div>

        <div class="admin-stats">
          <div class="admin-stat"><div class="admin-stat-num">${novels.length}</div><div class="admin-stat-label">إجمالي الروايات</div></div>
          <div class="admin-stat"><div class="admin-stat-num">${published}</div><div class="admin-stat-label">منشورة</div></div>
          <div class="admin-stat"><div class="admin-stat-num">${draft}</div><div class="admin-stat-label">مسودات</div></div>
          <div class="admin-stat"><div class="admin-stat-num">${users.length}</div><div class="admin-stat-label">مستخدم</div></div>
        </div>

        <!-- Novels -->
        <div class="admin-card">
          <div class="admin-card-header">
            <div class="admin-card-title">📚 جميع الروايات</div>
            <input class="input" style="max-width:240px;padding:8px 12px;font-size:13px" placeholder="بحث..." oninput="filterTable('novels-tbody',this.value)">
          </div>
          <div style="overflow-x:auto">
            <table class="admin-table">
              <thead><tr>
                <th>#</th><th>العنوان</th><th>الكاتب</th><th>الحالة</th><th>التاريخ</th><th>إجراء</th>
              </tr></thead>
              <tbody id="novels-tbody">
                ${novels.map(n => `<tr data-search="${escHtml((n.title+' '+(n.authorId||'')).toLowerCase())}">
                  <td style="color:#aaa">${n.id}</td>
                  <td style="font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(n.title)}</td>
                  <td>${n.authorId ? `<span style="font-size:12px;color:#888">ID: ${n.authorId}</span>` : '<span style="color:#bbb;font-size:12px">—</span>'}</td>
                  <td>${statusBadge(n.status)}</td>
                  <td style="font-size:12px;color:#aaa">${formatDate(n.createdAt)}</td>
                  <td><button class="btn btn-danger btn-sm" onclick="adminDeleteNovel(${n.id},this)">حذف</button></td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>

        <!-- Users -->
        <div class="admin-card">
          <div class="admin-card-header">
            <div class="admin-card-title">👥 جميع الحسابات</div>
            <input class="input" style="max-width:240px;padding:8px 12px;font-size:13px" placeholder="بحث..." oninput="filterTable('users-tbody',this.value)">
          </div>
          <div style="overflow-x:auto">
            <table class="admin-table">
              <thead><tr>
                <th>#</th><th>اسم المستخدم</th><th>البريد</th><th>الانضمام</th><th>إجراء</th>
              </tr></thead>
              <tbody id="users-tbody">
                ${users.map(u => `<tr data-search="${escHtml((u.username+' '+u.email).toLowerCase())}">
                  <td style="color:#aaa">${u.id}</td>
                  <td>
                    <a href="/profile.html?username=${encodeURIComponent(u.username)}" style="font-weight:600;color:#22262A;text-decoration:none">${escHtml(u.username)}</a>
                    ${u.email===ADMIN_EMAIL?'<span class="admin-badge" style="margin-right:8px">مشرف</span>':''}
                  </td>
                  <td style="font-size:13px;color:#666">${escHtml(u.email)}</td>
                  <td style="font-size:12px;color:#aaa">${formatDate(u.createdAt)}</td>
                  <td>${u.email===ADMIN_EMAIL?'<span style="color:#bbb;font-size:12px">—</span>':`<button class="btn btn-danger btn-sm" onclick="adminDeleteUser(${u.id},this)">حذف</button>`}</td>
                </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>`;
    }

    function filterTable(tbodyId, query) {
      const rows = document.getElementById(tbodyId)?.querySelectorAll('tr') || [];
      const q = query.toLowerCase();
      rows.forEach(r => {
        r.style.display = !q || r.dataset.search.includes(q) ? '' : 'none';
      });
    }

    async function adminDeleteNovel(id, btn) {
      if (!await confirmDialog('هل تريد حذف هذه الرواية نهائياً؟')) return;
      setLoading(btn, true);
      try {
        await api.delete(`/api/admin/novels/${id}`);
        btn.closest('tr').remove();
        toast('تم الحذف', 'success');
      } catch (err) {
        toast(err.message, 'error');
        setLoading(btn, false, 'حذف');
      }
    }

    async function adminDeleteUser(id, btn) {
      if (!await confirmDialog('هل تريد حذف هذا الحساب نهائياً؟ سيتم حذف جميع بياناته.')) return;
      setLoading(btn, true);
      try {
        await api.delete(`/api/admin/users/${id}`);
        btn.closest('tr').remove();
        toast('تم حذف الحساب', 'success');
      } catch (err) {
        toast(err.message, 'error');
        setLoading(btn, false, 'حذف');
      }
    }

    (async () => {
      await initPage('settings');
      await load();
    })();
  </script>
</body>
</html>
