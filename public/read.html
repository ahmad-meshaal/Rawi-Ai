<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>راوي — قراءة</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: #F5F0EA; }
    .read-topbar { background:white; border-bottom:1px solid #e8e8e5; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; box-shadow:0 1px 8px rgba(0,0,0,.06); }
    .read-container { max-width:720px; margin:40px auto; padding:0 20px 80px; }
    .read-novel-header { text-align:center; padding:40px 0 32px; border-bottom:2px solid #e8d5c0; margin-bottom:48px; }
    .read-novel-title { font-family:Amiri,serif; font-size:36px; font-weight:700; color:#22262A; margin-bottom:12px; }
    .read-author { font-size:16px; color:#888; }
    .chapter-section { margin-bottom:60px; }
    .chapter-heading { font-family:Amiri,serif; font-size:26px; font-weight:700; margin-bottom:28px; padding-bottom:16px; border-bottom:1px solid #e8d5c0; color:#22262A; display:flex; align-items:center; gap:12px; }
    .chapter-num { background:#C87539; color:white; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; flex-shrink:0; }
    .chapter-text { font-family:Amiri,serif; font-size:20px; line-height:2.3; color:#1a1a1a; white-space:pre-wrap; }
    .font-controls { display:flex; align-items:center; gap:10px; }
    @media print { .read-topbar,.print-hide { display:none !important; } body { background:white; } .read-container { padding:0; margin:0; max-width:100%; } }
    @media (max-width:767px) { .read-novel-title { font-size:26px; } .chapter-text { font-size:18px; } .read-container { padding:0 14px 80px; } }
  </style>
</head>
<body>
  <div class="read-topbar print-hide">
    <a href="javascript:history.back()" style="color:#888;text-decoration:none;display:flex;align-items:center;gap:6px;font-size:14px">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
      رجوع
    </a>
    <div id="topbar-title" style="font-family:Amiri,serif;font-size:18px;font-weight:700;color:#22262A;flex:1;text-align:center"></div>
    <div class="font-controls">
      <button class="btn btn-ghost btn-sm btn-icon" onclick="changeFontSize(-2)" title="تصغير الخط">ص</button>
      <button class="btn btn-ghost btn-sm btn-icon" onclick="changeFontSize(2)" title="تكبير الخط" style="font-size:18px">ص</button>
      <button class="btn btn-secondary btn-sm" onclick="window.print()">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>
        طباعة
      </button>
    </div>
  </div>

  <div class="read-container" id="read-container">
    <div class="loading-center"><div class="spinner"></div></div>
  </div>

  <div id="toast-container"></div>
  <script src="/js/common.js"></script>
  <script>
    const pr = params();
    const novelId = parseInt(pr.id);
    let fontSize = 20;

    if (!novelId) { window.location.href = '/library.html'; }

    function changeFontSize(delta) {
      fontSize = Math.max(14, Math.min(32, fontSize + delta));
      document.querySelectorAll('.chapter-text').forEach(el => el.style.fontSize = fontSize + 'px');
    }

    async function load() {
      try {
        const [novel, chapters] = await Promise.all([
          api.get(`/api/novels/${novelId}`),
          api.get(`/api/novels/${novelId}/chapters`),
        ]);

        document.title = `راوي — ${novel.title}`;
        document.getElementById('topbar-title').textContent = novel.title;
        await api.post(`/api/novels/${novelId}/view`).catch(() => {});

        const c = document.getElementById('read-container');
        const authorSection = novel.authorUsername
          ? `<a href="/profile.html?username=${encodeURIComponent(novel.authorUsername)}" style="color:#C87539;text-decoration:none;display:flex;align-items:center;gap:8px;justify-content:center;margin-top:8px">${avatarHtml({username:novel.authorUsername,avatarUrl:novel.authorAvatarUrl},28)} ${escHtml(novel.authorUsername)}</a>`
          : '';

        const chaptersHtml = chapters.length > 0
          ? chapters.map(ch => ch.content ? `<div class="chapter-section">
              <div class="chapter-heading"><div class="chapter-num">${ch.sequenceNumber}</div>${escHtml(ch.title)}</div>
              <div class="chapter-text">${escHtml(ch.content)}</div>
            </div>` : '').filter(Boolean).join('')
          : `<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">لا يوجد محتوى بعد</div></div>`;

        c.innerHTML = `
          <div class="read-novel-header">
            ${novel.coverUrl ? `<img src="${escHtml(novel.coverUrl)}" style="width:120px;height:160px;object-fit:cover;border-radius:12px;margin:0 auto 20px;display:block;box-shadow:0 8px 24px rgba(0,0,0,.15)">` : ''}
            <div class="read-novel-title">${escHtml(novel.title)}</div>
            ${novel.genre ? `<div style="margin-bottom:12px">${genreBadges(novel.genre)}</div>` : ''}
            ${authorSection}
            ${novel.synopsis ? `<p style="font-size:16px;color:#666;line-height:1.8;margin-top:20px;max-width:560px;margin-inline:auto">${escHtml(novel.synopsis)}</p>` : ''}
          </div>
          ${chaptersHtml}
          <div style="text-align:center;padding:32px 0;border-top:1px solid #e8d5c0;margin-top:40px">
            <div style="font-size:24px;margin-bottom:8px">🎉</div>
            <div style="font-family:Amiri,serif;font-size:18px;color:#888">نهاية الرواية</div>
            <a href="/library.html" class="btn btn-primary" style="margin-top:16px;display:inline-flex">اكتشف روايات أخرى</a>
          </div>`;
      } catch (err) {
        document.getElementById('read-container').innerHTML =
          `<div class="error-page"><div style="font-size:48px">📕</div><h2>لم يتم العثور على الرواية</h2><a href="/library.html" class="btn btn-primary" style="margin-top:12px">العودة للمكتبة</a></div>`;
      }
    }

    load();
  </script>
</body>
</html>
